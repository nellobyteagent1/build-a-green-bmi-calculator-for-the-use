<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>BMI Calculator</h1>
    <p class="subtitle">Calculate your Body Mass Index</p>

    <div class="unit-toggle">
      <button class="active" onclick="setUnit('metric')">Metric (kg/cm)</button>
      <button onclick="setUnit('imperial')">Imperial (lb/in)</button>
    </div>

    <div id="fields-metric">
      <div class="field">
        <label for="weight-kg">Weight (kg)</label>
        <input type="number" id="weight-kg" placeholder="e.g. 70" min="1" max="500" step="0.1">
        <div class="error-msg" id="err-wkg"></div>
      </div>
      <div class="field">
        <label for="height-cm">Height (cm)</label>
        <input type="number" id="height-cm" placeholder="e.g. 175" min="30" max="300" step="0.1">
        <div class="error-msg" id="err-hcm"></div>
      </div>
    </div>

    <div id="fields-imperial" style="display:none">
      <div class="field">
        <label for="weight-lb">Weight (lb)</label>
        <input type="number" id="weight-lb" placeholder="e.g. 154" min="1" max="1100" step="0.1">
        <div class="error-msg" id="err-wlb"></div>
      </div>
      <div class="input-row">
        <div class="field">
          <label for="height-ft">Height (ft)</label>
          <input type="number" id="height-ft" placeholder="5" min="1" max="9" step="1">
        </div>
        <div class="field">
          <label for="height-in">Height (in)</label>
          <input type="number" id="height-in" placeholder="9" min="0" max="11" step="0.1">
        </div>
      </div>
      <div class="error-msg" id="err-himp"></div>
    </div>

    <button class="calc" onclick="calculate()">Calculate BMI</button>

    <div class="result" id="result">
      <div class="bmi-value" id="bmi-value">--</div>
      <div class="bmi-category" id="bmi-category"></div>
      <div class="bmi-range" id="bmi-range"></div>
      <div class="bar-track">
        <div class="bar-indicator" id="bar-indicator"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
